<!doctype html>
<html lang="en">
<head>
  <!-- Phase-0: live propagation via satellite.js + CelesTrak -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project-X1</title>

  <!-- CesiumJS -->
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />

  <!-- satellite.js (CDN) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/1.3.0/satellite.min.js"></script>

  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 m-0">
  <div id="cesiumContainer" class="fixed inset-0"></div>

  <aside class="fixed z-20 top-4 left-4 w-[360px] max-w-[calc(100vw-2rem)] rounded-xl border border-slate-700/70 bg-slate-900/80 backdrop-blur p-4 space-y-3">
    <h1 class="text-lg font-semibold">SatTrack Pro</h1>
    <p class="text-xs text-slate-400">Phase-0 live propagation (CelesTrak + satellite.js)</p>
    <div class="grid grid-cols-2 gap-2 text-sm">
      <div class="rounded border border-slate-700 p-2">Loaded <span data-sat-count>0</span></div>
      <div class="rounded border border-slate-700 p-2">Visible <span data-visible-count>0</span></div>
    </div>
    <div id="status" class="text-xs text-slate-300 rounded border border-slate-700 p-2">Initializing…</div>
  </aside>

  <script>
    /**********************************************************************
     * Phase-0: remove exposed keys, use non-Ion defaults
     **********************************************************************/
    // Cesium.Ion.defaultAccessToken intentionally unset.

    /**********************************************************************
     * Cesium init
     **********************************************************************/
    const viewer = window.viewer || new Cesium.Viewer("cesiumContainer", {
      animation: false,
      timeline: true,
      baseLayerPicker: false,
      geocoder: false,
      homeButton: false,
      sceneModePicker: false,
      navigationHelpButton: false,
      fullscreenButton: false,
      infoBox: false,
      selectionIndicator: true
    });
    window.viewer = viewer;
    viewer.clock.shouldAnimate = true;
    viewer.clock.multiplier = 1;

    const statusEl = document.getElementById("status");
    const CELESTRAK_GROUP = "active";
    const CELESTRAK_TLE_URL = `https://celestrak.org/NORAD/elements/gp.php?GROUP=${encodeURIComponent(CELESTRAK_GROUP)}&FORMAT=tle`;
    const MAX_RENDERED = 800;

    function parseTLE(text) {
      const lines = text.split(/\r?\n/).map((l) => l.trim()).filter(Boolean);
      const out = [];
      for (let i = 0; i < lines.length; i += 1) {
        const maybeName = lines[i];
        const l1 = lines[i + 1];
        const l2 = lines[i + 2];
        if (!l1 || !l2) break;
        if (l1.startsWith("1 ") && l2.startsWith("2 ")) {
          out.push({ name: maybeName, line1: l1, line2: l2 });
          i += 2;
        }
      }
      return out;
    }

    const workerCode = `
      self.importScripts("https://cdnjs.cloudflare.com/ajax/libs/satellite.js/1.3.0/satellite.min.js");

      let sats = [];
      let lastSent = 0;

      self.onmessage = (e) => {
        const msg = e.data;
        if (msg.type === "LOAD_TLES") {
          sats = msg.payload.map((s, idx) => {
            const satrec = satellite.twoline2satrec(s.line1, s.line2);
            return { id: s.id ?? String(idx), name: s.name ?? ("SAT-" + idx), satrec };
          });
          self.postMessage({ type: "READY", count: sats.length });
          return;
        }

        if (msg.type === "TICK") {
          const nowMs = msg.nowMs;
          const date = new Date(nowMs);

          if (msg.minIntervalMs && (nowMs - lastSent) < msg.minIntervalMs) return;
          lastSent = nowMs;

          const out = [];
          for (let i = 0; i < sats.length; i += 1) {
            const s = sats[i];
            const pv = satellite.propagate(s.satrec, date);
            if (!pv || !pv.position) continue;

            const gmst = satellite.gstime(date);
            const gd = satellite.eciToGeodetic(pv.position, gmst);
            const lat = gd.latitude;
            const lon = gd.longitude;
            const altKm = gd.height;

            if (!Number.isFinite(lat) || !Number.isFinite(lon) || !Number.isFinite(altKm)) continue;

            out.push({ id: s.id, name: s.name, lat, lon, altM: altKm * 1000.0 });
          }

          self.postMessage({ type: "POS", nowMs, positions: out });
        }
      };
    `;

    const worker = new Worker(URL.createObjectURL(new Blob([workerCode], { type: "text/javascript" })));
    const posById = new Map();

    worker.onmessage = (e) => {
      const msg = e.data;
      if (msg.type === "READY") {
        const el = document.querySelector("[data-sat-count]");
        if (el) el.textContent = String(msg.count);
        statusEl.textContent = `Loaded ${msg.count} satellites`;
        return;
      }
      if (msg.type === "POS") {
        for (const p of msg.positions) posById.set(p.id, p);
        const visibleEl = document.querySelector("[data-visible-count]");
        if (visibleEl) visibleEl.textContent = String(msg.positions.length);
      }
    };

    function makeSatEntity(id, displayName) {
      return viewer.entities.add({
        id: "sat-" + id,
        name: displayName,
        position: new Cesium.CallbackProperty(() => {
          const p = posById.get(id);
          if (!p) return undefined;
          return Cesium.Cartesian3.fromRadians(p.lon, p.lat, p.altM);
        }, false),
        point: {
          pixelSize: 4,
          outlineWidth: 0,
          color: Cesium.Color.CYAN
        }
      });
    }

    let entitiesCreated = false;
    let renderList = [];

    async function loadAndStart() {
      statusEl.textContent = "Fetching TLE feed…";
      const res = await fetch(CELESTRAK_TLE_URL, { cache: "no-store" });
      if (!res.ok) throw new Error("TLE fetch failed: " + res.status + " " + res.statusText);
      const text = await res.text();
      const sats = parseTLE(text);

      renderList = sats.slice(0, MAX_RENDERED).map((s, i) => ({
        id: String(i),
        name: s.name,
        line1: s.line1,
        line2: s.line2
      }));

      worker.postMessage({ type: "LOAD_TLES", payload: renderList });

      if (!entitiesCreated) {
        viewer.entities.removeAll();
        for (const s of renderList) makeSatEntity(s.id, s.name);
        entitiesCreated = true;
      }

      setInterval(() => {
        worker.postMessage({
          type: "TICK",
          nowMs: Date.now(),
          minIntervalMs: 900
        });
      }, 250);
    }

    loadAndStart().catch((err) => {
      console.error(err);
      statusEl.textContent = "Live tracking failed: " + (err?.message || String(err));
      statusEl.className = "text-xs text-red-200 rounded border border-red-500 p-2 bg-red-900/40";
    });
  </script>
</body>
</html>
